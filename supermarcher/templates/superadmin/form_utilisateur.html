{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/logo.png' %}">
    <link rel="apple-touch-icon" href="{% static 'images/logo.png' %}">
<meta charset="UTF-8">
<title>{% if user %}Modifier{% else %}Ajouter{% endif %} Utilisateur</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; }
</style>
</head>
<body class="bg-gradient-to-br from-green-50 to-green-100 min-h-screen flex items-center justify-center">

<div id="globalLoader" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity duration-200">

    <div class="flex flex-col items-center space-y-3">
        
        <svg class="animate-spin h-10 w-10 text-white"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10"
                    stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>

        <span id="globalLoaderText" class="text-white text-sm font-medium">
            Chargement...
        </span>

    </div>

</div>

<div class="max-w-3xl w-full p-6">

  <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">
    {% if user %}Modifier{% else %}Ajouter{% endif %} Utilisateur
  </h1>

  <a href="{% url 'gestion_utilisateurs' %}"
     class="inline-block mb-6 bg-gray-700 text-white px-5 py-2 rounded-full shadow hover:bg-gray-800 transition">
    ← Retour
  </a>

  <form method="POST" class="bg-white p-6 md:p-8 rounded-2xl shadow-lg space-y-6">
    {% csrf_token %}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <!-- Username -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" required
               value="{{ user.username|default:'' }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Prénom -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="first_name">Prénom</label>
        <input type="text" id="first_name" name="first_name" required
               value="{{ user.first_name|default:'' }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Nom -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="last_name">Nom</label>
        <input type="text" id="last_name" name="last_name" required
               value="{{ user.last_name|default:'' }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="email">Email</label>
        <input type="email" id="email" name="email" required
               value="{{ user.email|default:'' }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Téléphone -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="telephone">Téléphone</label>
        <input type="text" id="telephone" name="telephone"
               value="{{ user.telephone|default:'' }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Rôle -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="role">Rôle</label>
        <select id="role" name="role" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="SUPERADMIN" {% if user.role == "SUPERADMIN" %}selected{% endif %}>Super Admin</option>
          <option value="GERANT" {% if user.role == "GERANT" %}selected{% endif %}>Gérant</option>
          <option value="CAISSIER" {% if user.role == "CAISSIER" %}selected{% endif %}>Caissier</option>
        </select>
      </div>

      <!-- Magasin -->
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="magasin">Magasin</label>
        <select id="magasin" name="magasin"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="">-- Aucun --</option>
          {% for m in magasins %}
          <option value="{{ m.id }}" {% if user.magasin and user.magasin.id == m.id %}selected{% endif %}>{{ m.nom }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Statut actif -->
      <div class="flex items-center mt-4 md:col-span-2">
        <input type="checkbox" id="is_active" name="is_active"
               class="mr-2 w-5 h-5 text-green-600 focus:ring-green-500 border-gray-300 rounded"
               {% if user.is_active or not user %}checked{% endif %}>
        <label for="is_active" class="text-gray-700 font-semibold">Actif</label>
      </div>

    </div>

    <!-- Bouton -->
    <div class="mt-6">
      <button type="submit"
              class="bg-green-600 text-white px-6 py-2 rounded-full shadow hover:bg-green-700 transition">
        {% if user %}Modifier{% else %}Ajouter{% endif %}
      </button>
    </div>

  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const isElectron = navigator.userAgent.toLowerCase().includes("electron");
    if (!isElectron) return;

    const loader = document.getElementById("globalLoader");
    const loaderText = document.getElementById("globalLoaderText");

    function showLoader(text = "Chargement...") {
        if (!loader) return;

        loaderText.textContent = text;
        loader.classList.remove("hidden");
    }

    // =============================
    // 1. FORMULAIRES
    // =============================
    document.querySelectorAll("form").forEach(form => {
        form.addEventListener("submit", () => {
            showLoader("Traitement...");
        });
    });

    // =============================
    // 2. TOUS LES CLICS (MAGIQUE)
    // =============================
    document.addEventListener("click", function (e) {

        const el = e.target.closest("a, button");

        if (!el) return;

        // Ignorer cas spéciaux
        if (
            el.hasAttribute("data-no-loader") ||
            el.disabled ||
            el.target === "_blank" ||
            el.hasAttribute("download")
        ) return;

        // Si c'est un lien
        if (el.tagName === "A") {

            const href = el.getAttribute("href");

            if (!href || href.startsWith("#") || href.startsWith("javascript:")) return;

            showLoader("Ouverture...");
        }

        // Si c'est un bouton (navigation ou action)
        if (el.tagName === "BUTTON") {

            // si bouton submit déjà géré
            if (el.type === "submit") return;

            showLoader("Chargement...");
        }

    });

    // =============================
    // 3. BACK / FORWARD navigateur
    // =============================
    window.addEventListener("beforeunload", function () {
        showLoader("Chargement...");
    });

});
</script>
</body>
</html>
