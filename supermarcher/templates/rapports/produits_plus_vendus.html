{% load humanize %}
<h2 class="label font-bold mb-2">Produits les plus vendus</h2>
<!-- Tableau Produits les Plus Vendus -->
<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Produit</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Quantité vendue</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for p in produits_plus_vendus %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ p.produit__nom }}</td>
                <td class="px-4 py-3 label">{{ p.total_vendu|intcomma }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="py-6 text-center text-gray-500 dark:text-gray-400 text-lg">
                    Aucune vente enregistrée
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
