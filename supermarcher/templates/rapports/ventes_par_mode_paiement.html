{% load humanize %}
<h2 class="label font-bold mb-2">Ventes par mode de paiement</h2>
<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Mode de paiement</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Nombre de ventes</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Montant total</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for m in ventes_par_mode_paiement %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ m.mode_paiement }}</td>
                <td class="px-4 py-3 label">{{ m.count }}</td>
                <td class="px-4 py-3 label">{{ m.total|floatformat:2|intcomma }} {{ magasin.devise }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="py-6 text-center text-gray-500 dark:text-gray-400 text-lg">
                    Aucun résultat
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
