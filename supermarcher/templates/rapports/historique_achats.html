{% load humanize %}
<h2 class="label font-bold mb-2">Historique des achats</h2>
<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Fournisseur</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Facture</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Montant</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Date</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for a in achats %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ a.fournisseur.nom }}</td>
                <td class="px-4 py-3 label">{{ a.numero_facture }}</td>
                <td class="px-4 py-3 label">{{ a.montant_total|floatformat:2|intcomma }} {{ a.magasin.devise }}</td>
                <td class="px-4 py-3 label">{{ a.date_creation|date:"d/m/Y H:i" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="py-6 text-center text-gray-500 dark:text-gray-400 text-lg">Aucun achat</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
