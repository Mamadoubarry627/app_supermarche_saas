{% load humanize %}

<h2 class="label font-bold mb-2">Panier moyen</h2>

<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Caissier</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Panier moyen</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for p in panier_moyen_par_caissier %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ p.caissier }}</td>
                <td class="px-4 py-3 label">{{ p.panier_moyen|floatformat:2|intcomma }} {{ magasin.devise }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="py-6 text-center text-gray-500">Aucun caissier trouvé</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
