{% load humanize %}
<h2 class="label font-bold mb-2">Top fournisseurs</h2>
<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Fournisseur</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Total achats</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for f in fournisseurs.annotate(total=Sum('achats__montant_total')).order_by('-total')[:10] %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ f.nom }}</td>
                <td class="px-4 py-3 label">{{ f.total|floatformat:2|intcomma }} {{ magasin.devise }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="py-6 text-center text-gray-500 dark:text-gray-400 text-lg">Aucun fournisseur</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
