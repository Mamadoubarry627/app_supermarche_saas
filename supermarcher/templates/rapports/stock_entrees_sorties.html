{% load humanize %}
<h2 class="label font-bold mb-2">Entrées / Sorties de stock</h2>
<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Produit</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Entrées</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Sorties</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Stock actuel</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for p in produits %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ p.nom }}</td>
                <td class="px-4 py-3 label">{{ p.entrees|intcomma }}</td>
                <td class="px-4 py-3 label">{{ p.sorties|intcomma }}</td>
                <td class="px-4 py-3 label">{{ p.quantite_stock|intcomma }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="py-6 text-center text-gray-500 dark:text-gray-400 text-lg">Aucun produit</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
