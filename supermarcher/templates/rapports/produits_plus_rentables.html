{% load humanize %}
<h2 class="label font-bold mb-2">Produits les plus rentables</h2>
<div class="overflow-x-auto rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 label:divide-gray-700 card">
        <thead class="btn-main">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Produit</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Marge totale</th>
            </tr>
        </thead>
        <tbody class="label divide-y divide-gray-200 label:divide-gray-700">
            {% for prod in produits_plus_rentables %}
            <tr class="hover:label transition">
                <td class="px-4 py-3 label">{{ prod.produit__nom }}</td>
                <td class="px-4 py-3 label">{{ prod.total_marge|floatformat:2|intcomma }} {{ magasin.devise }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="py-6 text-center text-gray-500 dark:text-gray-400 text-lg">
                    Aucun produit rentable enregistré
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
