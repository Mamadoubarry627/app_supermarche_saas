{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto bg-white dark:bg-gray-900 rounded-2xl shadow p-6">

    <h1 class="text-xl font-bold text-red-600 mb-4">
        Confirmer la suppression
    </h1>

    <p class="text-gray-700 dark:text-gray-300 mb-6">
        Voulez-vous vraiment supprimer la catégorie
        <strong>{{ categorie.nom }}</strong> ?
    </p>

    <form method="POST" class="flex justify-end space-x-3">
        {% csrf_token %}
        <a href="{% url 'categories_liste' %}"
           class="px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded-lg">
            Annuler
        </a>
        <button type="submit"
                class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
            Supprimer
        </button>
    </form>

</div>
{% endblock %}
