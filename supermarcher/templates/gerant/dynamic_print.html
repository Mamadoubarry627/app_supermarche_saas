<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Impression</title>

<style>
body {
    font-family: Arial;
    font-size: 12px;
}

.no-screen {
    display: none;
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th, .table td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

.table th {
    background: #16a34a;
    color: white;
}

@media print {
    .no-print {
        display: none !important;
    }
}

</style>
</head>

<body onload="window.print()">

<!-- HEADER -->
<div class="header">
    <div class="title">{{ nom_magasin }}</div>
    <div>{{ page_title }}</div>
    <div>{{ periode }}</div>
</div>

<hr>

<!-- TABLE DYNAMIQUE -->
<table class="table">

<thead>
<tr>
    {% for key in data.0.keys %}
        <th>{{ key }}</th>
    {% endfor %}
</tr>
</thead>

<tbody>

{% for row in data %}
<tr>
    {% for value in row.values %}
        <td>{{ value }}</td>
    {% endfor %}
</tr>
{% endfor %}

</tbody>

</table>

<!-- FOOTER -->
<div style="margin-top:30px;text-align:center;font-size:10px">
Document généré automatiquement - {{ date_generation }}
</div>

</body>
</html>
