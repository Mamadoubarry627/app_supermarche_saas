{% extends "base.html" %}
{% load humanize %}

{% block title %}Gestion des rapports - {{ magasin.nom }}{% endblock %}
{% block header %}Gestion des rapports{% endblock %}

{% block content %}

<!-- ===================================== -->
<!-- RAPPORTS - CATEGORIES ET FILTRES -->
<!-- ===================================== -->
<div class="space-y-6">

  <!-- ===================================== -->
  <!-- CATEGORIES DE RAPPORT -->
  <!-- ===================================== -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
    <button class="categorie-btn px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition" data-categorie="ventes">
      Rapports ventes
    </button>
    <button class="categorie-btn px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition" data-categorie="produits">
      Rapports produits
    </button>
    {% if request.user.role == "GERANT" %}
    <button class="categorie-btn px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition" data-categorie="stock">
      Rapports stock
    </button>
    <button class="categorie-btn px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition" data-categorie="fournisseurs">
      Rapports fournisseurs
    </button>
    <button class="categorie-btn px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition" data-categorie="finances">
      Rapports finances
    </button>
    <button class="categorie-btn px-4 py-2 bg-pink-600 text-white rounded-lg hover:bg-pink-700 transition" data-categorie="clients">
      Rapports clients
    </button>
    {% endif %}
  </div>

  <!-- ===================================== -->
  <!-- FILTRES RAPPORT -->
  <!-- ===================================== -->
  <div class="card p-4 shadow rounded-lg">

  <form id="filtre-form"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">

    <input type="hidden" name="magasin" id="magasin" value="{{ selected_magasin }}">

    <!-- Utilisateur -->
    <div class="flex flex-col w-full">
      <label class="label font-medium mb-1">Utilisateur</label>
      <select name="utilisateur" id="utilisateur"
              class="w-full px-3 py-2 border rounded-lg text-gray-800"
              {% if request.user.role == "CAISSIER" %} disabled {% endif %}>
        {% if request.user.role == "CAISSIER" %}
          <option value="{{ request.user.id }}" selected>{{ request.user.username }}</option>
        {% else %}
          <option value="">Tous</option>
          {% for u in utilisateurs %}
            <option value="{{ u.id }}"
              {% if u.id|stringformat:"s" == selected_utilisateur %} selected {% endif %}>
              {{ u.username }}
            </option>
          {% endfor %}
        {% endif %}
      </select>
    </div>

    <!-- Date début -->
    <div class="flex flex-col w-full">
      <label class="label font-medium mb-1">Date début</label>
      <input type="date" name="date_debut" id="date_debut"
             class="w-full px-3 py-2 border rounded-lg text-gray-800">
    </div>

    <!-- Date fin -->
    <div class="flex flex-col w-full">
      <label class="font-medium mb-1 label">Date fin</label>
      <input type="date" name="date_fin" id="date_fin"
             class="w-full px-3 py-2 border rounded-lg text-gray-800">
    </div>

    <!-- Jour spécifique -->
    <div class="flex flex-col w-full">
      <label class="label font-medium mb-1">Jour spécifique</label>
      <input type="date" name="jour" id="jour"
             class="w-full px-3 py-2 border rounded-lg text-gray-800">
    </div>

    <!-- Type de rapport -->
    <div class="flex flex-col w-full">
      <label class="label font-medium mb-1">Type de rapport</label>
      <select name="type_rapport" id="type_rapport"
              class="w-full px-3 py-2 border rounded-lg text-gray-800">
        <option value="">Sélectionner un rapport</option>
      </select>
    </div>

    <!-- Boutons période (alignés comme les champs) -->
    <div class="col-span-1 sm:col-span-2 lg:col-span-5">
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">

    <button type="button"
      class="w-full px-4 py-2 btn-main rounded-lg transition hover:opacity-90 periode-btn"
      data-periode="today">
      Aujourd'hui
    </button>

    <button type="button"
      class="w-full px-4 py-2 btn-main rounded-lg transition hover:opacity-90 periode-btn"
      data-periode="yesterday">
      Hier
    </button>

    <button type="button"
      class="w-full px-4 py-2 btn-main rounded-lg transition hover:opacity-90 periode-btn"
      data-periode="week">
      Cette semaine
    </button>

    <button type="button"
      class="w-full px-4 py-2 btn-main rounded-lg transition hover:opacity-90 periode-btn"
      data-periode="month">
      Ce mois
    </button>

  </div>
</div>

  </form>

  <!-- Boutons action séparés -->
  <div class="mt-4 flex gap-3">

    <button id="downloadPDF"
      class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
      Télécharger PDF
    </button>

    <button id="printBtn"
      class="px-4 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900">
      🖨️ Imprimer
    </button>

  </div>

</div>

</div>
  <!-- ===================================== -->
  <!-- LOADER -->
  <!-- ===================================== -->
  <div id="loader" class="hidden fixed inset-0 flex items-center justify-center bg-black/10 backdrop-blur-sm z-50">
  <div class="flex flex-col items-center">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-300 border-t-blue-600"></div>
  </div>
</div>

  <!-- ===================================== -->
  <!-- RESULTAT RAPPORT -->
  <!-- ===================================== -->
  <div id="rapport-container" class="overflow-x-auto"></div>
</div>

<!-- ===================================== -->
<!-- JAVASCRIPT AJAX -->
<!-- ===================================== -->
<script>
const rapports = {
  ventes: [
    ["produits_plus_vendus", "Produits les plus vendus"],
    ["performance_caissier", "Performance caissier"],
    ["chiffres_cles", "Chiffres clés"],
    ["produits_vendus", "Produits vendus"],
    ["ventes_annulees", "Ventes annulées"],
    ["ventes_par_categorie", "Ventes par catégorie"],        // nouveau
    ["ventes_par_mode_paiement", "Ventes par mode de paiement"], // nouveau
    ["ventes_par_client", "Ventes par client"]             // nouveau
  ],
  produits: [
    ["produits_reapprovisionnement", "Produits à réapprovisionner"],
    ["produits_proches_peremption", "Produits proches de la date d’expiration"],
    ["produits_expire", "Produits expirés"],
    ["produits_jamais_vendus", "Produits jamais vendus"],
    ["produits_plus_rentables", "Produits les plus rentables"],    // nouveau
    ["rotation_stock", "Rotation de stock par produit"]             // nouveau
  ],
  stock: [
    ["stock_actuel", "Stock actuel"],
    ["mouvements_stock", "Mouvements de stock"],
    ["valeur_stock", "Valeur totale du stock"]                     // nouveau
  ],
  fournisseurs: [
    ["achats_par_fournisseur", "Achats par fournisseur"],
    ["delai_livraison_fournisseur", "Délai moyen de livraison fournisseur"], // nouveau
    ["historique_prix_fournisseur", "Historique des prix par fournisseur"]   // nouveau
  ],
  finances: [                                                        // nouvelle catégorie
    ["ca_par_categorie", "Chiffre d’affaires par catégorie"],        // nouveau
    ["marge_par_produit", "Marge par produit"],                      // nouveau
    ["panier_moyen", "Panier moyen"]                               // nouveau
  
  ],
  clients: [                                                         // nouvelle catégorie
    ["clients_fideles", "Clients fidèles"],                          // nouveau
    ["frequence_achat", "Fréquence d’achat par client"],            // nouveau
    ["valeur_client", "Valeur client (panier moyen cumulé)"]        // nouveau
  ]
};

const categorieBtns = document.querySelectorAll(".categorie-btn");
const selectRapport = document.getElementById("type_rapport");
const rapportContainer = document.getElementById("rapport-container");
const loader = document.getElementById("loader");

// ===============================
// CHANGEMENT CATEGORIE
// ===============================
categorieBtns.forEach(btn => {
  btn.addEventListener("click", function() {

    // Retirer active sur tous les boutons
    categorieBtns.forEach(b => b.classList.remove("ring-4", "ring-offset-2", "ring-blue-500"));

    // Ajouter style actif sur le bouton cliqué
    this.classList.add("ring-4", "ring-offset-2", "ring-blue-500");

    const categorieActive = this.dataset.categorie;

    // Réinitialiser select
    selectRapport.innerHTML = '<option value="">Sélectionner un rapport</option>';

    if (rapports[categorieActive]) {
      rapports[categorieActive].forEach(r => {
        const option = document.createElement("option");
        option.value = r[0];
        option.textContent = r[1];
        selectRapport.appendChild(option);
      });
    }

    // Vider le container
    rapportContainer.innerHTML = "";
  });
});

// ===============================
// CHARGEMENT RAPPORT AJAX
// ===============================
document.getElementById("filtre-form").addEventListener("change", function() {

  const typeRapport = selectRapport.value;
  if(!typeRapport) return;

  const params = new URLSearchParams({
    type_rapport: typeRapport,
    utilisateur: document.getElementById("utilisateur").value,
    date_debut: document.getElementById("date_debut").value,
    date_fin: document.getElementById("date_fin").value,
    jour: document.getElementById("jour").value
  });

  loader.classList.remove("hidden");
  rapportContainer.innerHTML = "";

  fetch(`/rapports/ajax/?${params.toString()}`)
    .then(async response => {

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Erreur serveur ${response.status}: ${text}`);
      }

      return response.json();
    })
    .then(data => {
      if (data.html) {
        rapportContainer.innerHTML = data.html;
      } else if (data.error) {
        rapportContainer.innerHTML = `<p class="text-red-500 text-center py-6">Erreur: ${data.error}</p>`;
      } else {
        rapportContainer.innerHTML = `<p class="text-red-500 text-center py-6">Erreur inconnue</p>`;
      }
    })
    .catch(err => {
      rapportContainer.innerHTML = `<p class="text-red-500 text-center py-6">Erreur lors du chargement du rapport:<br>${err.message}</p>`;
      console.error(err);
    })
    .finally(() => {
      loader.classList.add("hidden"); // ✅ ICI seulement
    });
});

const periodeBtns = document.querySelectorAll(".periode-btn");

function setActive(btn) {
  periodeBtns.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

periodeBtns.forEach(btn => {

  btn.addEventListener("click", function(){

    setActive(this);

    const today = new Date();
    let start = "";
    let end = "";

    const type = this.dataset.periode;

    if(type === "today"){
      start = end = today.toISOString().split("T")[0];
    }

    if(type === "yesterday"){
      const y = new Date(today);
      y.setDate(today.getDate() - 1);
      start = end = y.toISOString().split("T")[0];
    }

    function formatDateLocal(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    if (type === "week") {
      const first = new Date(today);

      const day = today.getDay() || 7; // dimanche = 7
      first.setDate(today.getDate() - day + 1);

      start = formatDateLocal(first);
      end = formatDateLocal(today);
    }

    if(type === "month"){
      const first = new Date(today.getFullYear(), today.getMonth(), 1);

      start = first.toISOString().split("T")[0];
      end = today.toISOString().split("T")[0];
    }

    document.getElementById("date_debut").value = start;
    document.getElementById("date_fin").value = end;
    document.getElementById("jour").value = "";

    document.getElementById("filtre-form").dispatchEvent(new Event("change"));

  });

});

document.getElementById("downloadPDF").addEventListener("click", function(){

    const type = document.getElementById("type_rapport").value;

    if (!type) {
        showToast("⚠️ Veuillez sélectionner un type de rapport");
        return;
    }

    const params = new URLSearchParams({
        type_rapport: type,
        utilisateur: document.getElementById("utilisateur").value,
        date_debut: document.getElementById("date_debut").value,
        date_fin: document.getElementById("date_fin").value,
        jour: document.getElementById("jour").value
    });

    window.open(`/rapports/export/pdf/?${params.toString()}`, "_blank");
});

document.getElementById("printBtn").addEventListener("click", function(){

    const type = document.getElementById("type_rapport").value;

    if (!type) {
        showToast("⚠️ Veuillez sélectionner un type de rapport");
        return;
    }

    const params = new URLSearchParams({
        type_rapport: type,
        utilisateur: document.getElementById("utilisateur").value,
        date_debut: document.getElementById("date_debut").value,
        date_fin: document.getElementById("date_fin").value,
        jour: document.getElementById("jour").value
    });

    window.open(`/rapports/print/?${params.toString()}`, "_blank");
});

const isElectron = navigator.userAgent.toLowerCase().includes("electron");
if (isElectron) {
    document.getElementById("downloadPDF").style.display = "none";
}

function showToast(message) {
  const toast = document.createElement("div");
  toast.innerText = message;

  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.right = "20px";
  toast.style.background = "#e11d48";
  toast.style.color = "white";
  toast.style.padding = "12px 18px";
  toast.style.borderRadius = "8px";
  toast.style.zIndex = "9999";
  toast.style.boxShadow = "0 5px 15px rgba(0,0,0,0.3)";

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}
</script>

{% endblock %}
